# Sanctum OS Neofetch Configuration
# Print with ASCII art and system information

print_info() {
    # Custom ASCII art for Sanctum OS
    prin "$(color 1)   ╔═══════════════════════════════════════╗"
    prin "$(color 1)   ║$(color 7)  ███████╗ █████╗ ███╗   ██╗  ║$(color 1)"
    prin "$(color 1)   ║$(color 7)  ██╔════╝██╔══██╗████╗  ██║  ║$(color 1)"
    prin "$(color 1)   ║$(color 7)  ███████╗███████║██╔██╗ ██║  ║$(color 1)"
    prin "$(color 1)   ║$(color 7)  ╚════██║██╔══██║██║╚██╗██║  ║$(color 1)"
    prin "$(color 1)   ║$(color 7)  ███████║██║  ██║██║ ╚████║  ║$(color 1)"
    prin "$(color 1)   ║$(color 7)  ╚══════╝╚═╝  ╚═╝╚═╝  ╚═══╝  ║$(color 1)"
    prin "$(color 1)   ║$(color 3)     SANCTUM OS v1.0           ║$(color 1)"
    prin "$(color 1)   ║$(color 3)  Theological Computing Env   ║$(color 1)"
    prin "$(color 1)   ╚═══════════════════════════════════════╝"
    prin ""
    
    info "$(color 1)  OS" os
    info "$(color 1)  Host" model
    info "$(color 1)  Kernel" kernel
    info "$(color 1)  Uptime" uptime
    info "$(color 1)  Packages" packages
    info "$(color 1)  Shell" shell
    info "$(color 1)  DE/WM" de wm
    info "$(color 1)  Terminal" term
    info "$(color 1)  CPU" cpu
    info "$(color 1)  GPU" gpu
    info "$(color 1)  Memory" memory
    
    prin ""
    prin "$(color 3)  Gloria Patri, et Filio, et Spiritui Sancto"
}

# Title
title_fqdn="off"

# Kernel
kernel_shorthand="on"

# Distro
distro_shorthand="off"
os_arch="on"

# Uptime
uptime_shorthand="on"

# Memory
memory_percent="on"

# Packages
package_managers="on"

# Shell
shell_shorthand="off"

# CPU
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"

# GPU
gpu_brand="on"
gpu_type="all"

# Resolution
title=""

# Gtk Theme / Icons / Font
gtk_shorthand="off"
gtk2="on"
gtk3="on"

# IP Address
public_ip_host="http://ident.me"
public_ip_timeout=2

# Disk
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"

# Colors
colors=(1 3 0 7 1 3)

# Bold text
bold="on"

# Image backend
image_backend="ascii"
image_source="auto"

# ASCII distro
ascii_distro="auto"
ascii_colors=(1 3 0)
ascii_bold="on"

# Image loop
image_loop="off"

# Thumbnail directory
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"

# Crop mode
crop_mode="normal"
crop_offset="center"

# Image size
image_size="auto"

# Gap
gap=3

# Image offsets
yoffset=0
xoffset=0

# Background color
background_color=""

# Stdout mode
stdout="off"

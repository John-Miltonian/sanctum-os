# Sanctum OS - Kitty Configuration
# A theological computing environment
# ═══════════════════════════════════════════════════════════════════

# Font configuration
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.0

# Cursor
cursor #d4c4a8
cursor_text_color #0a0a0a
cursor_shape block
cursor_blink_interval 0.5

# ═══════════════════════════════════════════════════════════════════
# COLOR SCHEME - Sanctum OS
# ═══════════════════════════════════════════════════════════════════
# Deep cassock black, cardinal red, Byzantine gold, aged parchment

# Background - Deep black like a cassock
background #0a0a0a

# Foreground - Aged parchment/vellum
foreground #d4c4a8

# Selection
selection_background #8b0000
selection_foreground #f5f5dc

# URL color
url_color #b8860b

# ═══════════════════════════════════════════════════════════════════
# 16 ANSI COLORS
# ═══════════════════════════════════════════════════════════════════

# Black - Darker shades of cassock
color0  #121212
color8  #2a2a2a

# Red - Cardinal red
# Used for errors, warnings, important text
# Symbolizes the blood of martyrs and the Sacred Heart
color1  #8b0000
color9  #b22222

# Green - Ancient olive, ecclesiastical green
# Ordinary time, hope, life
# Symbolizes the olive branch and new life in Christ
color2  #4a5d23
color10 #6b8e23

# Yellow - Byzantine gold
# Divine glory, Easter joy
# Symbolizes the radiance of the heavenly kingdom
color3  #b8860b
color11 #daa520

# Blue - Deep ecclesiastical blue
# Marian blue, heavenly virtue
# Symbolizes the Virgin Mary and heavenly grace
color4  #1a3a5c
color12 #4682b4

# Magenta - Royal purple
# Lent, penance, royalty
# Symbolizes Christ the King and penitential seasons
color5  #4a1942
color13 #800080

# Cyan - Patristic teal
# Truth, theology, the Fathers
# Symbolizes the living water and baptism
color6  #5f9ea0
color14 #87ceeb

# White - Aged vellum, cornsilk
# Purity, light, the Word
# Symbolizes the light of Christ and holy scripture
color7  #e8dcc4
color15 #f5f5dc

# ═══════════════════════════════════════════════════════════════════
# WINDOW SETTINGS
# ═══════════════════════════════════════════════════════════════════

# Opacity
background_opacity 0.95
background_blur 0

# Window padding
window_padding_width 4
window_margin_width 0

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted

tab_bar_background #0a0a0a
tab_bar_margin_color #0a0a0a

active_tab_background   #8b0000
active_tab_foreground   #f5f5dc
active_tab_font_style   bold

inactive_tab_background #1a1a1a
inactive_tab_foreground #888888
inactive_tab_font_style normal

# ═══════════════════════════════════════════════════════════════════
# SCROLLBACK
# ═══════════════════════════════════════════════════════════════════

scrollback_lines 10000
scrollback_indicator_height 3
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_fill_enlarged_window no

# ═══════════════════════════════════════════════════════════════════
# MOUSE
# ═══════════════════════════════════════════════════════════════════

mouse_hide_wait 3.0
focus_follows_mouse no
copy_on_select yes
paste_actions quote-urls-at-prompt
strip_trailing_spaces smart

# ═══════════════════════════════════════════════════════════════════
# PERFORMANCE
# ═══════════════════════════════════════════════════════════════════

repaint_delay 10
input_delay 3
sync_to_monitor yes

# ═══════════════════════════════════════════════════════════════════
# BELL
# ═══════════════════════════════════════════════════════════════════

enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes
bell_on_tab yes

# ═══════════════════════════════════════════════════════════════════
# TERMINAL FEATURES
# ═══════════════════════════════════════════════════════════════════

enable_hyperlinks yes
shell_integration enabled
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# ═══════════════════════════════════════════════════════════════════
# KEYBOARD SHORTCUTS
# ═══════════════════════════════════════════════════════════════════

# Font size
map ctrl+equal change_font_size all +2.0
map ctrl+minus change_font_size all -2.0
map ctrl+0 change_font_size all 0

# Scrollback
map shift+up scroll_line_up
map shift+down scroll_line_down
map shift+page_up scroll_page_up
map shift+page_down scroll_page_down

# Copy/paste
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+q close_tab
map ctrl+shift+l next_tab
map ctrl+shift+h previous_tab

# Windows
map ctrl+shift+enter new_window_with_cwd
map ctrl+shift+w close_window
map ctrl+shift+] next_window
map ctrl+shift+[ previous_window

# Layout
map ctrl+shift+l next_layout

# Open URL
map ctrl+shift+o open_url_with_hints

# ═══════════════════════════════════════════════════════════════════
# OS-SPECIFIC
# ═══════════════════════════════════════════════════════════════════

linux_display_server wayland

# ═══════════════════════════════════════════════════════════════════
# SESSION
# ═══════════════════════════════════════════════════════════════════

startup_session none

# Sanctum OS - Hyprland Configuration
# A theological computing environment
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# MONITORS
# ═══════════════════════════════════════════════════════════════════
monitor=,preferred,auto,auto

# ═══════════════════════════════════════════════════════════════════
# INPUT
# ═══════════════════════════════════════════════════════════════════
input {
    kb_layout = us
    kb_variant = 
    kb_model = 
    kb_options =
    kb_rules = 
    
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0 # -1.0 - 1.0, 0 means no modification
}

# ═══════════════════════════════════════════════════════════════════
# GENERAL - Sanctum Theme Colors
# ═══════════════════════════════════════════════════════════════════
general {
    # Sanctum OS Color Scheme
    # Deep cassock black, cardinal red, Byzantine gold, aged parchment
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Col.active: Cardinal red border for active window
    col.active_border = rgba(8b0000ee) rgba(b8860b99) 45deg
    
    # Col.inactive: Darker, subdued border for inactive windows
    col.inactive_border = rgba(2a2a2aaa)
    
    # No border for floating windows by default
    no_border_on_floating = false
    
    layout = dwindle
    
    # Allow tearing for performance
    allow_tearing = false
}

# ═══════════════════════════════════════════════════════════════════
# DECORATION
# ═══════════════════════════════════════════════════════════════════
decoration {
    rounding = 4
    blur {
        enabled = true
        size = 3
        passes = 1
        new_optimizations = true
    }
    
    # Subtle shadow like a manuscript page
    drop_shadow = true
    shadow_range = 4
    shadow_render_power = 3
    col.shadow = rgba(0a0a0aee)
    col.shadow_inactive = rgba(0a0a0a99)
}

# ═══════════════════════════════════════════════════════════════════
# ANIMATIONS
# ═══════════════════════════════════════════════════════════════════
animations {
    enabled = true
    
    # Dignified, measured animations - no frivolous bouncing
    bezier = smooth, 0.25, 0.1, 0.25, 1
    bezier = solemn, 0.4, 0, 0.2, 1
    
    animation = windows, 1, 7, smooth
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, smooth
    animation = workspaces, 1, 6, solemn
    animation = specialWorkspace, 1, 6, solemn, slidevert
}

# ═══════════════════════════════════════════════════════════════════
# LAYOUT
# ═══════════════════════════════════════════════════════════════════
dwindle {
    pseudotile = true
    preserve_split = true
    special_scale_factor = 0.8
}

master {
    new_is_master = true
    special_scale_factor = 0.8
}

# ═══════════════════════════════════════════════════════════════════
# MISC
# ═══════════════════════════════════════════════════════════════════
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    
    # No anime characters - reverent, minimal
    force_default_wallpaper = 0
    
    # VRR
    vrr = 0
    
    # Focus follows mouse
    mouse_refocus = true
}

# ═══════════════════════════════════════════════════════════════════
# EXEC ON STARTUP
# ═══════════════════════════════════════════════════════════════════
exec-once = waybar
exec-once = mako --default-timeout=5000
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# ═══════════════════════════════════════════════════════════════════
# ENVIRONMENT
# ═══════════════════════════════════════════════════════════════════
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ═══════════════════════════════════════════════════════════════════
# WORKSPACE RULES - Biblical Naming
# ═══════════════════════════════════════════════════════════════════
# 1 Genesis    - Terminal, shell, CLI tools
# 2 Exodus     - Browser, web applications  
# 3 Leviticus  - Code editor, development
# 4 Numbers    - File manager, system tools
# 5 Deuteronomy- Documents, reading
# 6 Psalms     - Media, music
# 7 Proverbs   - Communication, chat
# 8 Gospels    - Study, research, notes
# 9 Revelation - System monitoring, logs
# 0 (10)       - Special/floating

workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# Window rules for theological applications
windowrulev2 = workspace 1, class:^(kitty|alacritty|wezterm|foot)$
windowrulev2 = workspace 2, class:^(firefox|chromium|brave|librewolf|qutebrowser|org.qutebrowser.qutebrowser)$
windowrulev2 = workspace 3, class:^(code|nvim|vim|emacs|neovim|neovide)$
windowrulev2 = workspace 4, class:^(thunar|nautilus|dolphin|pcmanfm|nemo|ranger)$
windowrulev2 = workspace 5, class:^(zathura|sioyek|org.pwmt.zathura|evince|okular)$
windowrulev2 = workspace 6, class:^(spotify|ncspot|ncmpcpp|cmus|mpv)$
windowrulev2 = workspace 7, class:^(discord|slack|telegram|signal|element)$
windowrulev2 = workspace 8, class:^(obsidian|logseq|joplin|zotero|anki)$
windowrulev2 = workspace 9, class:^(btop|htop|gotop|ytop|glances)$

# Float certain windows
windowrulev2 = float,class:^(pavucontrol|org.pulseaudio.pavucontrol)$
windowrulev2 = float,class:^(blueman-manager)$
windowrulev2 = float,class:^(nm-connection-editor)$
windowrulev2 = float,class:^(rofi|wofi|fuzzel|bemenu)$
windowrulev2 = float,title:^(Picture-in-Picture)$
windowrulev2 = float,title:^(DevTools)$

# ═══════════════════════════════════════════════════════════════════
# KEYBINDINGS
# ═══════════════════════════════════════════════════════════════════
$mainMod = SUPER

# Terminal
bind = $mainMod, Return, exec, kitty
bind = $mainMod SHIFT, Return, exec, kitty --class floating-terminal

# Application launcher
bind = $mainMod, D, exec, wofi --show drun --style ~/.config/wofi/sanctum.css
bind = $mainMod SHIFT, D, exec, rofi -show combi -theme sanctum

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, S, togglesplit

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# Window movement
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

# Resize mode
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -20 0
binde = , J, resizeactive, 0 20
binde = , K, resizeactive, 0 -20
binde = , L, resizeactive, 20 0
bind = , Escape, submap, reset
submap = reset

# Workspaces - Biblical naming
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspaces
bind = $mainMod, grave, togglespecialworkspace, scratchpad
bind = $mainMod SHIFT, grave, movetoworkspace, special:scratchpad

# Screenshot
bind = , Print, exec, grimblast --notify copy area
bind = SHIFT, Print, exec, grimblast --notify copysave area ~/Pictures/screenshots/$(date +%Y-%m-%d-%H%M%S).png

# Clipboard history
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Color picker
bind = $mainMod, C, exec, hyprpicker -a

# Lock screen
bind = $mainMod, X, exec, hyprlock

# Browser
bind = $mainMod, B, exec, firefox

# File manager
bind = $mainMod, E, exec, thunar

# Editor
bind = $mainMod, N, exec, kitty nvim

# Theology applications
bind = $mainMod, T, exec, kitty biblia --daily
bind = $mainMod SHIFT, T, exec, kitty patres --random
bind = $mainMod, period, exec, sanctum-quote

# Volume
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
